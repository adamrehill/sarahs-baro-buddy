<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="10" fill="#07090f"/>
  <!-- Antenna -->
  <rect x="18" y="3.5" width="4" height="7" rx="2" fill="#334155"/>
  <circle cx="20" cy="3" r="3.5" fill="url(#fg)"/>
  <!-- Head -->
  <rect x="5" y="10" width="30" height="22" rx="6"
        fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Left eye — blue gauge (Winnipeg) -->
  <circle cx="14" cy="20" r="5" fill="#070a10" stroke="rgba(56,189,248,0.65)" stroke-width="1"/>
  <line x1="14" y1="20" x2="16.5" y2="17" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="14" cy="20" r="1.2" fill="#cbd5e1"/>
  <!-- Right eye — amber gauge (Kelowna) -->
  <circle cx="26" cy="20" r="5" fill="#070a10" stroke="rgba(245,158,11,0.65)" stroke-width="1"/>
  <line x1="26" y1="20" x2="28.5" y2="17" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="26" cy="20" r="1.2" fill="#cbd5e1"/>
  <!-- Smile -->
  <path d="M 14 26 Q 20 30 26 26"
        stroke="rgba(255,255,255,0.4)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
